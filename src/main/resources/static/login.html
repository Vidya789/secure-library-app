<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Library App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrapper">
    <div class="container">
        <div class="app-title">Secure Library App</div>
        <div class="page-subtitle">User Login</div>

        <form id="loginForm" method="post" action="javascript:void(0);">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required minlength="3">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required minlength="3">

            <button type="submit">Login</button>
        </form>

        <p id="message"></p>

        <div class="menu">
            <a class="btn" href="register.html">Register</a>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    window.addEventListener("load", () => {
        const form = document.getElementById("loginForm");
        if (form) {
            form.addEventListener("submit", loginUser);
        }
        initializeLoginPage();
    });
</script>
</body>
</html>
