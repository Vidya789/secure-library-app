<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Secure Library App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrapper">
    <div class="container">
        <div class="app-title">Secure Library App</div>
        <div class="page-subtitle">Admin Dashboard</div>

        <form id="bookForm">
            <input type="hidden" id="bookId">

            <label for="title">Title</label>
            <input id="title" type="text" required minlength="2">

            <label for="author">Author</label>
            <input id="author" type="text" required minlength="2">

            <label for="category">Category</label>
            <input id="category" type="text" required minlength="2">

            <button type="submit">Save Book</button>
        </form>

        <p id="message"></p>

        <h3 class="section-title">Manage Books</h3>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="adminBooksTableBody"></tbody>
        </table>

        <h3 class="section-title">Borrow Requests</h3>
        <table>
            <thead>
            <tr>
                <th>Request ID</th>
                <th>User ID</th>
                <th>Book ID</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="borrowRequestsTableBody"></tbody>
        </table>

        <div class="menu">
            <button id="logoutBtn" type="button" class="btn">Logout</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script src="admin.js"></script>
</body>
</html>
